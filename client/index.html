<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Sim</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container"></div>
  <div id="error-overlay" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#a00;color:#fff;padding:12px;font:14px monospace;z-index:9999;max-height:200px;overflow:auto;"></div>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      var el = document.getElementById('error-overlay');
      el.style.display = 'block';
      el.innerHTML += '<div>' + msg + ' (line ' + line + ')</div>';
      return false;
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="js/constants.js?v=20"></script>
  <script src="js/network.js?v=20"></script>
  <script src="js/utils/math.js?v=20"></script>
  <script src="js/systems/PathfindingSystem.js?v=20"></script>
  <script src="js/systems/ResourceSystem.js?v=20"></script>
  <script src="js/systems/BuildingSystem.js?v=20"></script>
  <script src="js/systems/UnitSystem.js?v=20"></script>
  <script src="js/systems/UISystem.js?v=20"></script>
  <script src="js/scenes/MenuScene.js?v=20"></script>
  <script src="js/scenes/LobbyScene.js?v=20"></script>
  <script src="js/scenes/GameScene.js?v=20"></script>
  <script src="js/main.js?v=20"></script>
</body>
</html>
